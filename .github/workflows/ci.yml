name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Set up Homebrew
      run: brew update

    - name: Run Regression Tests
      run: tests/run_tests.sh

    - name: Verify CLI Installation (Homebrew mode)
      run: |
        # Workaround: GitHub Actions git environment is tricky for Homebrew (shallow clones, auth).
        # We will create a local tarball and install from that to simulate a "stable" release.
        
        # 1. Create tarball (exclude the tarball itself to avoid warnings)
        tar -czf better-anonymity.tar.gz --exclude .git --exclude better-anonymity.tar.gz .
        SHA256=$(shasum -a 256 better-anonymity.tar.gz | awk '{print $1}')
        
        # 2. Overwrite Formula to point to the local tarball
        cat <<EOF > Formula/better-anonymity.rb
        class BetterAnonymity < Formula
          desc "MacOS Security, Privacy & Anonymity Tools"
          homepage "https://github.com/phaedrus/better-anonymity"
          url "file://$(pwd)/better-anonymity.tar.gz"
          version "1.0.0"
          sha256 "$SHA256"
          license "MIT"
        
          def install
            libexec.install "bin", "lib", "README.md", "LICENSE"
            bin.install_symlink libexec/"bin/better-anonymity"
            bin.install_symlink libexec/"bin/better-anonymity" => "better-anon"
            bin.install_symlink libexec/"bin/better-anonymity" => "b-a"
          end
        
          test do
            assert_match "Usage", shell_output("#{bin}/better-anonymity help")
          end
        end
        EOF
        
        # 3. Create Tap and Install
        brew tap-new local/test --no-git
        cp Formula/better-anonymity.rb $(brew --repo local/test)/Formula/
        brew install local/test/better-anonymity
        
        echo "=== DEBUG: Installed Files ==="
        ls -R $(brew --cellar better-anonymity)
        
        better-anonymity help
        b-a help

    - name: Verify CLI Installation (Pip mode)
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip3 install .
        python3 -m better_anonymity help
        b-a help
